name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        run: zig build test --summary all
      - name: zig build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe
      - name: e2e
        run: bash tests/e2e.sh
